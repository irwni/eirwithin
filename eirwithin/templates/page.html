{% extends "base.html" %}

{% block title %}{{ page.title }} | {{ config.title }}{% endblock title %}

{% block content %}
  <article>
    <h1>{{ page.title }}</h1>
    <time>{{ page.date | date(format="%Y-%m-%d") }}</time>
    <!-- page.content är det renderade HTML-innehållet från din markdown -->
    {{ page.content | safe }}
  </article>
{% endblock content %}
